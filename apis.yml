name: Vornado Realty Trust
description: >-
  Vornado Realty Trust (NYSE: VNO) is a fully integrated Real Estate Investment
  Trust (REIT) focused on owning and operating premier office and retail
  properties in New York City. With nearly 20 million square feet of office
  space and over 2.4 million square feet of Manhattan street retail, Vornado is
  among the largest commercial real estate companies in the United States. The
  company also owns residential units, marketplaces, and advertising signage in
  Times Square and Pennsylvania Station.
